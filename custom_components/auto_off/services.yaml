set_group:
  name: Set Group
  description: Create or update an auto-off group.
  fields:
    group_name:
      name: Group Name
      description: Unique name of the group.
      required: true
      example: kitchen
      selector:
        text:
    targets:
      name: Targets
      description: Entities to turn off when the delay elapses.
      required: true
      selector:
        entity:
          multiple: true
    sensors:
      name: Sensors
      description: Binary sensors whose OFF state starts the turn-off timer.
      required: false
      selector:
        entity:
          multiple: true
          domain: binary_sensor
    sensor_templates:
      name: Sensor templates
      description: >
        Jinja templates rendered to bool. Treated the same as binary sensors.
      required: false
      selector:
        object:
    delay:
      name: Delay (minutes)
      description: >
        Integer (minutes) or a Jinja template rendering to minutes.
      required: false
      default: 0
      example: 5
      selector:
        text:

delete_group:
  name: Delete Group
  description: Delete an auto-off group.
  fields:
    group_name:
      name: Group Name
      description: Name of the group to delete.
      required: true
      example: kitchen
      selector:
        text:

dump_group:
  name: Dump Group
  description: >
    Return a YAML block under `yaml` that recreates the named group via
    auto_off.set_group. Read-only; the caller must request response data
    (Developer Tools → Services → "Show response").
  fields:
    group_name:
      name: Group Name
      description: Name of the group to dump.
      required: true
      example: kitchen
      selector:
        text:
