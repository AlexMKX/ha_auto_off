# HA package: test entities for door_occupancy E2E tests
template:
  - binary_sensor:
      - name: "Test Door"
        unique_id: test_door
        state: "{{ states('input_boolean.test_door_state') }}"
        device_class: door

input_boolean:
  test_door_state:
    name: Test Door State
    initial: false

logger:
  default: info
  logs:
    custom_components.door_occupancy: debug
