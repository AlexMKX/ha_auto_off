name: Validate

on:
  pull_request:
    branches: [ master ]
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Pin HA to the minimum version declared in hacs.json so the import
        # check sees the same APIs the integration was written against
        # (e.g. homeassistant.components.group.valve, added in 2025.x).
        pip install flake8 "homeassistant>=2025.12.0"
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Останавливаемся на серьезных ошибках синтаксиса или неопределенных именах
        flake8 custom_components/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Выводим все остальные предупреждения как информацию (не останавливаем CI)
        flake8 custom_components/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Validate manifest.json
      run: |
        python -c "
        import json
        import sys
        
        try:
            with open('custom_components/auto_off/manifest.json', 'r') as f:
                manifest = json.load(f)
            
            required_fields = ['domain', 'name', 'version', 'documentation', 'dependencies', 'codeowners']
            missing_fields = [field for field in required_fields if field not in manifest]
            
            if missing_fields:
                print(f'Missing required fields in manifest.json: {missing_fields}')
                sys.exit(1)
            
            print('manifest.json is valid')
            print(f'Domain: {manifest[\"domain\"]}')
            print(f'Name: {manifest[\"name\"]}')
            print(f'Version: {manifest[\"version\"]}')
            
        except Exception as e:
            print(f'Error validating manifest.json: {e}')
            sys.exit(1)
        "

    - name: Validate hacs.json
      run: |
        python -c "
        import json
        import sys
        
        try:
            with open('hacs.json', 'r') as f:
                hacs = json.load(f)
            
            required_fields = ['name', 'domains']
            missing_fields = [field for field in required_fields if field not in hacs]
            
            if missing_fields:
                print(f'Missing required fields in hacs.json: {missing_fields}')
                sys.exit(1)
            
            print('hacs.json is valid')
            print(f'Name: {hacs[\"name\"]}')
            print(f'Domains: {hacs[\"domains\"]}')
            
        except Exception as e:
            print(f'Error validating hacs.json: {e}')
            sys.exit(1)
        "

    - name: Check Python import paths
      run: |
        python -c "
        import sys
        import os
        import traceback
        sys.path.insert(0, 'custom_components')
        
        try:
            from auto_off.auto_off import GroupConfig, AutoOffManager
            from auto_off.const import DOMAIN, CONF_GROUPS, CONF_POLL_INTERVAL
            print('✓ All imports work correctly')
        except Exception as e:
            print(f'❌ Error: {e}')
            traceback.print_exc()
            sys.exit(1)
        "

  unit-tests:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install homeassistant pytest pytest-asyncio pydantic pyyaml jinja2
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run unit tests
      env:
        AUTOQA_MODE: unit
      run: |
        python -m pytest -c ha-test-kit/pyproject.toml --rootdir . custom_components/auto_off/tests -m "not docker_e2e" -q --tb=short